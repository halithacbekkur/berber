<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0D68A"/>
      <stop offset="40%" stop-color="#C8941F"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>
  <!-- Dark circle bg -->
  <circle cx="32" cy="32" r="31" fill="#0A0A0A"/>
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="url(#g)" stroke-width="0.7" opacity="0.5"/>
  <!-- Scissors icon - premium barber symbol -->
  <!-- Left blade -->
  <ellipse cx="24" cy="42" rx="5.5" ry="3" transform="rotate(-30 24 42)" fill="none" stroke="url(#g)" stroke-width="1.8"/>
  <!-- Right blade -->
  <ellipse cx="40" cy="42" rx="5.5" ry="3" transform="rotate(30 40 42)" fill="none" stroke="url(#g)" stroke-width="1.8"/>
  <!-- Blade lines -->
  <line x1="27" y1="39" x2="32" y2="28" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="37" y1="39" x2="32" y2="28" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center pivot -->
  <circle cx="32" cy="36" r="1.5" fill="url(#g)"/>
  <!-- Arabic د letter on top -->
  <text x="32" y="24" text-anchor="middle" font-family="serif" font-size="18" font-weight="700" fill="url(#g)" opacity="0.9">د</text>
  <!-- Subtle sparkle dots -->
  <circle cx="15" cy="18" r="0.8" fill="#F0D68A" opacity="0.4"/>
  <circle cx="49" cy="18" r="0.8" fill="#F0D68A" opacity="0.4"/>
  <circle cx="32" cy="58" r="0.8" fill="#F0D68A" opacity="0.3"/>
</svg>
